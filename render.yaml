services:
  - type: web
    name: farunqingmiao
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run server:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      - name: data
        mountPath: /opt/render/project/src/data
        sizeGB: 1
      - name: uploads
        mountPath: /opt/render/project/src/uploads
        sizeGB: 1